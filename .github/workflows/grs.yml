name: Update README cards

on:
  schedule:
    - cron: "50 1 * * *"
    - cron: "20 6 * * *"
    - cron: "15 17 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Generate stats card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&theme=dracula&show_icons=true&hide_border=false&layout=compact&title_color=a48cf2&text_color=37f499&icon_color=04d1f9&border_color=a48cf2&bg_color=212337
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top language card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&theme=dracula&show_icons=true&hide_border=false&layout=compact&title_color=a48cf2&text_color=37f499&icon_color=04d1f9&border_color=a48cf2&bg_color=212337
          path: profile/language.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
